name: Deploy Peak360

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: [self-hosted, dock]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build -t peak360:latest -t "peak360:${SHORT_SHA}" .

      - name: Deploy new container
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          OLD_CONTAINER=""

          # Stop and rename existing container if running
          if docker ps -a --format '{{.Names}}' | grep -q '^peak360$'; then
            OLD_CONTAINER="peak360-old-${SHORT_SHA}"
            docker rename peak360 "${OLD_CONTAINER}"
            docker stop "${OLD_CONTAINER}"
          fi

          # Start new container
          docker run -d \
            --name peak360 \
            --env-file /opt/peak360/.env \
            --restart unless-stopped \
            --network n8n-docker-caddy_default \
            peak360:latest

          # Connect to second network
          docker network connect strongbodies-net peak360

          # Health check loop (30 attempts x 2s = 60s max)
          echo "Waiting for health check..."
          for i in $(seq 1 30); do
            if docker exec peak360 wget --no-verbose --tries=1 --spider http://localhost:3000/api/health 2>/dev/null; then
              echo "Health check passed on attempt ${i}"
              HEALTHY=true
              break
            fi
            echo "Attempt ${i}/30 - waiting..."
            sleep 2
          done

          if [ "${HEALTHY}" != "true" ]; then
            echo "Health check failed — rolling back"

            # Rollback: stop new, restore old
            docker stop peak360 || true
            docker rm peak360 || true

            if [ -n "${OLD_CONTAINER}" ]; then
              docker rename "${OLD_CONTAINER}" peak360
              docker start peak360
              echo "Rolled back to previous container"
            fi

            exit 1
          fi

          # Success: clean up old container
          if [ -n "${OLD_CONTAINER}" ]; then
            docker rm "${OLD_CONTAINER}" || true
            echo "Removed old container"
          fi

      - name: Prune dangling images
        if: always()
        run: docker image prune -f
